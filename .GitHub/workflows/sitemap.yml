name: Generate Sitemap

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Generate sitemap
        run: |
          echo '<?xml version="1.0" encoding="UTF-8"?>' > sitemap.xml
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> sitemap.xml

          for file in *.html; do
            DATE=$(date -r "$file" +%Y-%m-%d 2>/dev/null || date +%Y-%m-%d)
            echo "  <url>" >> sitemap.xml
            echo "    <loc>https://hanumanbhakti.org/$file</loc>" >> sitemap.xml
            echo "    <lastmod>$DATE</lastmod>" >> sitemap.xml
            echo "    <priority>0.80</priority>" >> sitemap.xml
            echo "  </url>" >> sitemap.xml
          done

          echo '</urlset>' >> sitemap.xml

      - name: Commit sitemap
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add sitemap.xml
          git commit -m "Auto update sitemap [skip ci]" || echo "No changes to commit"
          git push
